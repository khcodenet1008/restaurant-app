name: restaurant-app-ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - gateway-service
          - menu-service
          - order-service
          - payment-service
          - notification-service
          - inventory-service
          - kitchen-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven
      - name: Build service
        working-directory: restaurant-app
        run: mvn -pl services/${{ matrix.service }} -am test
