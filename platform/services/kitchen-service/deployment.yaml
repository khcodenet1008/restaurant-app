apiVersion: apps/v1
kind: Deployment
metadata:
  name: kitchen-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kitchen-service
  template:
    metadata:
      labels:
        app: kitchen-service
    spec:
      containers:
        - name: kitchen-service
          image: docker.io/khcodenet1008/kitchen-service:dev
          envFrom:
            - configMapRef:
                name: kitchen-service-config
          ports:
            - containerPort: 8080
