apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
    spec:
      containers:
        - name: inventory-service
          image: docker.io/khcodenet1008/inventory-service:dev
          envFrom:
            - configMapRef:
                name: inventory-service-config
          ports:
            - containerPort: 8080
