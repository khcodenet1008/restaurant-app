apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: harbor.example.com/cblm/order-service:dev
          envFrom:
            - configMapRef:
                name: order-service-config
          ports:
            - containerPort: 8080
