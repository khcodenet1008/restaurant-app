apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: harbor.example.com/cblm/notification-service:dev
          envFrom:
            - configMapRef:
                name: notification-service-config
          ports:
            - containerPort: 8080
